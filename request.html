<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odeslat požadavek</title>
<style>
body{font-family:sans-serif;margin:20px;background:#f1f5f9;}
label{display:block;margin-top:15px;font-size:18px;}
input{width:100%;padding:10px;font-size:18px;border-radius:5px;margin-top:5px;border:1px solid #ccc;}
button{margin-top:20px;padding:15px;font-size:20px;width:100%;border:none;border-radius:10px;background:#22c55e;color:white;font-weight:bold;}
#ok{margin-top:15px;font-size:18px;color:green;}
</style>
</head>
<body>

<h1>Nový požadavek</h1>
<label for="kontakt">Kontakt</label>
<input type="text" id="kontakt">
<label for="prurez">Průřez</label>
<input type="text" id="prurez">
<label for="jmeno">Jméno</label>
<input type="text" id="jmeno">
<button onclick="send()">ODESLAT</button>
<div id="ok"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// Firebase config
const firebaseConfig = {
  apiKey: "TVŮJ_API_KEY",
  authDomain: "TVŮJ_PROJECT.firebaseapp.com",
  databaseURL: "https://TVŮJ_PROJECT-default-rtdb.firebaseio.com",
  projectId: "TVŮJ_PROJECT",
  storageBucket: "TVŮJ_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Send request
function send(){
  const kontakt=document.getElementById("kontakt").value;
  const prurez=document.getElementById("prurez").value;
  const jmeno=document.getElementById("jmeno").value;
  if(!kontakt || !prurez || !jmeno){
    alert("Vyplň všechna pole");
    return;
  }
  db.ref("pozadavky").push({
    kontakt:kontakt,
    prurez:prurez,
    jmeno:jmeno,
    time:Date.now()
  });
  document.getElementById("kontakt").value="";
  document.getElementById("prurez").value="";
  document.getElementById("jmeno").value="";
  document.getElementById("ok").innerText="Požadavek odeslán";
}
</script>

</body>
</html>
