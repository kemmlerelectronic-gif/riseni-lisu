<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Přidat požadavek</title>
<style>
body { font-family:Segoe UI,Arial; background:#0b1220; color:white; padding:20px; }
input, button { padding:10px; margin:5px; border-radius:6px; border:none; }
input { width:100%; }
button { background:#3b82f6; color:white; cursor:pointer; }
</style>
</head>
<body>

<h2>Přidat nový požadavek</h2>

<input id="kontakt" placeholder="Číslo kontaktu">
<input id="prurez" placeholder="Průřez">
<input id="jmeno" placeholder="Jméno">

<button onclick="addRequest()">Přidat</button>

<script>
// Funkce pro načtení požadavků z localStorage
function loadRequests() {
    const p = JSON.parse(localStorage.getItem("pozadavky"));
    return p || [];
}

// Funkce pro uložení požadavků
function saveRequests(pozadavky) {
    localStorage.setItem("pozadavky", JSON.stringify(pozadavky));
}

// Přidání požadavku
function addRequest() {
    const kontakt = document.getElementById("kontakt").value.trim();
    const prurez = document.getElementById("prurez").value.trim();
    const jmeno = document.getElementById("jmeno").value.trim();

    if(!kontakt || !prurez || !jmeno) {
        alert("Vyplňte všechna pole!");
        return;
    }

    const pozadavky = loadRequests();
    pozadavky.push({kontakt, prurez, jmeno});
    saveRequests(pozadavky);

    alert("Požadavek přidán!");

    // Vyčistit pole
    document.getElementById("kontakt").value = "";
    document.getElementById("prurez").value = "";
    document.getElementById("jmeno").value = "";
}
</script>

</body>
</html>
